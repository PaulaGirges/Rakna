<!DOCTYPE html>
<html>
 <head>
    <title> form Register</title>
    <meta name="viewport" content="width=device-width ,initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="http://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
<style type="text/css">
    body{
     padding-top:100px ;
    background: powderblue;
    }
 .form-signup{
    margin: 0 auto;
    max-width: 400px;
    background-color: white;
    padding: 15px;
 }
 .form-signup h2{
    text-align: center;
 }


</style>
</head>
<body>
<div class="container">
    <form class="form-signup">
        <h2>Register</h2>
        <P>Create Your account it's free only take a minute.</P>
        <div class="form-group">

        <div class="row">
            <div class="col-6">
                <input type="text"  class="form-control" name="First Name" placeholder="First Name">
            </div>
            <div class="col-6">
                <input type="text" class="form-control" name="Last Name" placeholder="Last Name">
            </div>
        </div>

        </div>
        <div class="form-group">
          <input type="email" class="form-control" name="Email" placeholder="Email Address">
        </div>
        <div class="form-group">
           <input type="password"  class="form-control" name="Password" placeholder="Password">
        </div>
        <div class="form-group">
            <input type="password" class="form-control" name="Confirm_password" placeholder="onfirm_password">
         </div>
         <div class="form-group">
            <label>
                <input type="checkbox" name="">
                I accept the <a href="#"> Terms of Use</a> &<a href="">privacy policy</a>
            </label>
         </div>
         <button type="submit" class="btn btn-primary btn-block">Signup</button>
    </form>
</div>
</body>
</html>
